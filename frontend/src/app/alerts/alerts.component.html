<div class="alerts-page">
  <div class="alerts-header">
    <div>
      <h1 class="page-title">System Alerts</h1>
      <p class="page-subtitle">Real-time notifications and warnings for your stock inventory</p>
    </div>
    <button class="secondary-btn" (click)="loadAlerts()">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"></path><path d="M1 20v-6h6"></path><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
      Refresh
    </button>
  </div>

  <div *ngIf="isLoading" class="loading-state">
    <div class="spinner"></div>
    <p>Loading alerts...</p>
  </div>

  <div *ngIf="!isLoading && alerts.length === 0" class="empty-state">
    <div class="empty-icon-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
    </div>
    <h3>No active alerts</h3>
    <p>Everything looks good! All systems are within normal parameters.</p>
  </div>

  <div *ngIf="!isLoading && alerts.length > 0" class="alerts-list">
    <div *ngFor="let alert of alerts" class="alert-card" [class.unread]="!alert.read" [class.resolved]="alert.read">
      <div class="alert-indicator" [class]="getTypeClass(alert.type)"></div>
      
      <div class="alert-main">
        <div class="alert-icon-wrap" [class]="getTypeClass(alert.type)">
          <svg *ngIf="alert.type === 'WARNING'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
          <svg *ngIf="alert.type === 'ERROR'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
          <svg *ngIf="alert.type === 'INFO'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
          <svg *ngIf="alert.type === 'SUCCESS'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>

        <div class="alert-content">
          <div class="alert-header">
            <h3 class="alert-title">{{ alert.title }}</h3>
            <span class="alert-time">{{ alert.createdAt | date:'medium' }}</span>
          </div>
          <p class="alert-msg">{{ alert.message }}</p>
          <div class="alert-footer">
            <span class="category-tag">{{ alert.category }}</span>
            <button *ngIf="!alert.read" class="mark-btn" (click)="markAsRead(alert)">
               Mark as Read
            </button>
            <span *ngIf="alert.read" class="status-badge">Resolved</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
