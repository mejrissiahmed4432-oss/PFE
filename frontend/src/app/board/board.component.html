<div class="board-container">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/><path d="M7 7h2M7 11h2M13 7l2 2-2 2"/></svg>
            </div>
            <span class="logo-text">ITManage</span>
        </div>
        
        <nav class="sidebar-nav">
            <a href="#" class="nav-item active">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                <span>Dashboard</span>
            </a>
            <a href="#" class="nav-item">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
                <span>Equipment</span>
            </a>
            <a href="#" class="nav-item">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <span>Users</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-profile" *ngIf="user">
                <img [src]="user.photo || 'default-user.png'" alt="User Avatar" class="avatar">
                <div class="user-info">
                    <span class="user-name">{{ user.firstName }} {{ user.lastName }}</span>
                    <span class="user-role">{{ user.role }}</span>
                </div>
            </div>
            <button class="logout-btn" (click)="logout()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </button>
        </div>
    </aside>

    <main class="content">
        <header class="content-header">
            <h1>Welcome to your Board, {{ user?.firstName }}!</h1>
            <p>You are logged in as {{ user?.role }}.</p>
        </header>

        <section class="dashboard-stats">
            <div class="stat-card">
                <h3>Total Equipment</h3>
                <p class="stat-value">124</p>
            </div>
            <div class="stat-card">
                <h3>Active Failures</h3>
                <p class="stat-value text-red">8</p>
            </div>
            <div class="stat-card">
                <h3>Team Members</h3>
                <p class="stat-value">15</p>
            </div>
        </section>
    </main>
</div>
