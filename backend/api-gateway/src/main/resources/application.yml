server:
  port: 8000

spring:
  application:
    name: api-gateway
  codec:
    max-in-memory-size: 50MB
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            maxAge: 3600
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
      routes:
        - id: user-microservice
          uri: lb://user-microservice
          predicates:
            - Path=/api/users/**
        - id: equipment-route
          uri: lb://stock-manager-microservice
          predicates:
            - Path=/api/equipment/**
        - id: supplier-route
          uri: lb://stock-manager-microservice
          predicates:
            - Path=/api/suppliers/**
        - id: shelf-route
          uri: lb://stock-manager-microservice
          predicates:
            - Path=/api/shelves/**
        - id: dashboard-route
          uri: lb://stock-manager-microservice
          predicates:
            - Path=/api/dashboard/**
        - id: alerts-route
          uri: lb://stock-manager-microservice
          predicates:
            - Path=/api/alerts/**, /api/alerts

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost
